<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snowboard Finder</title>
  <!-- Inline SVG emoji used as favicon, no separate file needed -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏂</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>

  <!-- decorative blurred background blobs, purely visual no interaction -->
  <div class="bg-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
  </div>

  <div class="app-wrapper">

    <!-- QUIZ PANEL -->
    <div id="quiz-panel">
      <header class="app-header">
        <div class="header-icon">
          <img src="/ASSETS/snowboardr-logo.svg" alt="SnowboardR logo" width="120" height="120" />
        </div>
        <h1>SNOWBOARD<br><span>FINDER</span></h1>
        <p class="header-sub">Answer a few questions and we'll match you to your perfect ride.</p>
      </header>

      <!-- novalidate disables browser default validation so we can handle it ourselves in main.js -->
      <form id="finder-form" novalidate>

        <div class="form-section">
          <div class="section-label">YOUR STATS</div>
          <div class="fields-row">
            <div class="field">
              <label for="height">Height (cm)</label>
              <input type="number" id="height" name="height" min="130" max="220" placeholder="175" required />
            </div>
            <div class="field">
              <label for="weight">Weight (kg)</label>
              <input type="number" id="weight" name="weight" min="30" max="150" placeholder="78" required />
            </div>
            <div class="field">
              <label for="boot-size">Boot size (UK)</label>
              <input type="number" id="boot-size" name="bootSize" min="3" max="14" step="0.5" placeholder="9" required />
            </div>
            <div class="field">
              <label for="budget">Max budget (£)</label>
              <input type="number" id="budget" name="budget" min="0" step="50" placeholder="e.g. 600" />
            </div>
          </div>
        </div>

        <div class="form-section">
          <div class="section-label">YOUR RIDING</div>
          <div class="fields-row">
            <div class="field">
              <label for="ability">Ability level</label>
              <select id="ability" name="ability" required>
                <option value="" disabled selected>Select…</option>
                <option value="beg">Beginner</option>
                <option value="beg-int">Beg / Intermediate</option>
                <option value="int">Intermediate</option>
                <option value="int-adv">Int / Advanced</option>
                <option value="adv">Advanced</option>
              </select>
            </div>
            <div class="field">
              <label for="feel">Preferred feel</label>
              <select id="feel" name="feel" required>
                <option value="" disabled selected>Select…</option>
                <option value="playful">Playful</option>
                <option value="balanced">Balanced</option>
                <option value="aggressive">Aggressive</option>
                <option value="surfy">Surfy</option>
              </select>
            </div>
            <div class="field">
              <label for="riding-style">Riding style</label>
              <select id="riding-style" name="ridingStyle" required>
                <option value="" disabled selected>Select…</option>
                <option value="all-mountain">All-mountain</option>
                <option value="freeride">Freeride</option>
                <option value="park">Park</option>
                <option value="piste">Piste</option>
                <option value="powder">Powder</option>
                <option value="touring">Touring</option>
              </select>
            </div>
          </div>
        </div>

        <div class="form-section">
          <div class="section-label">TERRAIN FOCUS <span class="hint">— pick up to 3</span></div>
          <div class="checkgroup" id="terrain-group">
            <label class="check-pill"><input type="checkbox" name="terrain" value="groomers" /><span>Groomers</span></label>
            <label class="check-pill"><input type="checkbox" name="terrain" value="park" /><span>Park</span></label>
            <label class="check-pill"><input type="checkbox" name="terrain" value="powder" /><span>Powder</span></label>
            <label class="check-pill"><input type="checkbox" name="terrain" value="trees" /><span>Trees</span></label>
            <label class="check-pill"><input type="checkbox" name="terrain" value="tech" /><span>Tech</span></label>
            <label class="check-pill"><input type="checkbox" name="terrain" value="backcountry" /><span>Backcountry</span></label>
          </div>
        </div>

        <div class="form-footer">
          <p id="status"></p>
          <button type="submit" id="submit-btn">
            <span>FIND MY BOARD</span>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </button>
        </div>

      </form>
    </div>

    <!-- RESULTS PANEL (hidden initially) -->
    <div id="results-panel" class="hidden">
      <div class="results-header">
        <button id="back-btn" class="back-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          New search
        </button>
        <div>
          <h2 id="results-title">YOUR TOP PICKS</h2>
          <p id="results-subtitle"></p>
        </div>
      </div>

      <div id="filter-bar">
        <select id="filter-brand">
          <option value="">All brands</option>
        </select>

        <select id="filter-flex">
          <option value="">Any flex</option>
          <option value="soft">Soft (1-3)</option>
          <option value="medium">Medium (4-6)</option>
          <option value="stiff">Stiff (7-10)</option>
        </select>

        <div id="filter-price">
          <label for="price-range">Max price: £<span id="price-label">1600</span></label>
          <input type="range" id="price-range" min="200" max="1600" step="50" value="1600" />
        </div>

        <button id="filter-reset">Reset filters</button>
      </div>

      <section id="top-picks-section">
        <div class="section-heading">
          <span class="badge badge-gold">⭐ Top Picks</span>
        </div>
        <div id="top-picks-grid" class="boards-grid"></div>
      </section>

      <section id="also-consider-section" class="hidden">
        <div class="section-heading">
          <span class="badge badge-silver">Also Consider</span>
        </div>
        <div id="also-consider-grid" class="boards-grid"></div>
      </section>
    </div>

  </div>

  <!-- BOARD DETAIL MODAL -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal" class="modal">
      <button id="modal-close" class="modal-close">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
      <div id="modal-content"></div>
    </div>
  </div>

  <script type="module" src="./main.js"></script>

</body>
</html>
